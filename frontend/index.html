<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; connect-src http://127.0.0.1:8000;">
    <title>AI-Powered OSINT Risk Intelligence System</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">

        <h1>AI-Powered OSINT Risk Intelligence System</h1>

        <div class="form-box">

            <input type="text" id="name" placeholder="Enter Your Name">

            <input type="email" id="email" placeholder="Enter Your Email">

            <input type="text" id="phone" placeholder="Enter Phone Number (Optional)">

            <button id="scanBtn">Scan OSINT Risk</button>

        </div>

        <div class="result-box">

            <h2>OSINT Risk Report</h2>

            <div id="result">

                <p>No scan performed yet.</p>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
